<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body { font-family: Arial; margin: 20px; }

.question { margin-bottom: 20px; }

.variant { display: block; margin-bottom: 5px; cursor: pointer; }

.correct { color: green; }
.incorrect { color: red; }

.correct-answer {
    font-weight: bold;
    color: green;
}

.pagination { text-align: center; margin-top: 20px; }
.pagination button { margin: 5px; padding: 8px; }
.pagination .active { background: blue; color: white; }

/* 🌙 DARK MODE */
body.dark {
    background: #121212;
    color: #eee;
}

body.dark .question {
    background: #1e1e1e;
    padding: 10px;
    border-radius: 8px;
}

body.dark button {
    background: #333;
    color: white;
    border: none;
}

body.dark .variant {
    color: #ddd;
}
</style>
</head>

<body>

<h2>Тест</h2>

<div>
    <label>С:</label>
    <input type="number" id="startQ" value="1" min="1">

    <label>До:</label>
    <input type="number" id="endQ" value="100" min="1">

    <label>Количество:</label>
    <input type="number" id="countQ" value="30" min="1">

    <button onclick="applyRange()">Применить</button>
</div>

<br>

<button onclick="shuffleQuestions()">Барлығын араластыру</button>
<button onclick="shuffleCurrentPage()">Осы бетті араластыру</button>
<button onclick="showCorrectAnswers()">Дұрыс жауаптар</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="toggleTheme()">🌙 Тема</button>

<div id="quiz"></div>
<div class="pagination" id="pagination"></div>

<script>
let currentPage = 1;
const questionsPerPage = 30;
let allQuestions = [];
let originalQuestions = [];

// 🚀 загрузка
async function loadTest() {
    try {
        const res = await fetch('test.txt');
        const text = await res.text();

        allQuestions = parseQuestions(text);
        originalQuestions = [...allQuestions];

        renderPage(currentPage);
        renderPagination();
    } catch (e) {
        document.getElementById('quiz').innerHTML =
            "<p style='color:red'>Ошибка загрузки test.txt (открой через localhost или добавь файл рядом)</p>";
    }
}

// 📦 парсинг
function parseQuestions(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const questions = [];
    let current = [];

    lines.forEach(line => {
        if (/^\d+\s/.test(line)) {
            if (current.length) questions.push(current);
            current = [line];
        } else {
            current.push(line);
        }
    });

    if (current.length) questions.push(current);
    return questions;
}

// 📄 рендер
function renderPage(page) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    const start = (page - 1) * questionsPerPage;
    const pageData = allQuestions.slice(start, start + questionsPerPage);

    pageData.forEach((q, i) => {
        const questionIndex = start + i;
        const questionText = q[0].replace(/^\d+\s*/, '');

        let correctVariant = null;

        const variants = q.slice(1).map(v => {
            if (v.endsWith('+')) {
                const clean = v.replace('+', '').trim();
                correctVariant = clean;
                return clean;
            }
            return v;
        });

        const shuffled = shuffle([...variants]);
        const correctIndex = shuffled.indexOf(correctVariant);

        const div = document.createElement('div');
        div.className = 'question';

        div.innerHTML += `<p>${questionIndex + 1}. ${questionText}</p>`;

        const labels = ['A','B','C','D','E'];

        shuffled.forEach((v, idx) => {
            const label = document.createElement('label');
            label.className = 'variant';

            label.innerHTML = `
                <input type="radio" name="q${questionIndex}">
                ${labels[idx]}. ${v}
            `;

            if (idx === correctIndex) {
                label.dataset.correct = true;
            }

            label.querySelector('input').onchange = () => {
                checkAnswer(div, label);
            };

            div.appendChild(label);
        });

        const result = document.createElement('div');
        div.appendChild(result);

        quiz.appendChild(div);
    });
}

// ✅ проверка
function checkAnswer(questionDiv, selectedLabel) {
    const result = questionDiv.querySelector('div');

    if (selectedLabel.dataset.correct) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.textContent = 'Қате ❌';
        result.className = 'incorrect';
    }
}

// 🔢 пагинация
function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const total = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= total; i++) {
        const b = document.createElement('button');
        b.textContent = i;

        if (i === currentPage) b.classList.add('active');

        b.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(b);
    }
}

// 🔀 shuffle
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// 🔥 все
function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

// 🔥 страница
function shuffleCurrentPage() {
    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const part = allQuestions.slice(start, end);
    const shuffledPart = shuffle([...part]);

    allQuestions.splice(start, part.length, ...shuffledPart);

    renderPage(currentPage);
}

// 📊 диапазон
function applyRange() {
    const start = parseInt(document.getElementById('startQ').value) - 1;
    const end = parseInt(document.getElementById('endQ').value);
    const count = parseInt(document.getElementById('countQ').value);

    let selected = originalQuestions.slice(start, end);
    selected = shuffle([...selected]).slice(0, count);

    allQuestions = selected;

    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

// 👀 ответы
function showCorrectAnswers() {
    document.querySelectorAll('[data-correct]').forEach(el => {
        el.classList.add('correct-answer');
    });
}

// 🔄 reset
function resetAll() {
    allQuestions = [...originalQuestions];
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

// 🌙 тема
function toggleTheme() {
    document.body.classList.toggle('dark');

    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

// 🚀 init
window.onload = () => {
    loadTest();

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
};
</script>

</body>
</html>
