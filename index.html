<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест жүйесі</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.question {
    margin-bottom: 25px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.variant {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

.correct { color: green; }
.incorrect { color: red; }

.pagination {
    margin-top: 20px;
}

.pagination button {
    margin: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

.active {
    background: blue;
    color: white;
    font-weight: bold;
}

pre {
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>Тест</h1>

<button onclick="shuffleQuestions()">Барлық сұрақтарды араластыру</button>
<button onclick="shuffleCurrentPage()">Осы беттегі сұрақтарды араластыру</button>
<button onclick="resetAll()">Қайта бастау</button>
<button onclick="showAllAnswers()">Жауап көрсету</button>

<div id="quiz"></div>
<div id="pagination"></div>

<script>

let currentPage = 1;
const questionsPerPage = 50;
let allQuestions = [];

async function loadTest() {
    try {
        const response = await fetch('test.txt');
        const text = await response.text();

        allQuestions = text
            .split('\n')
            .reduce((acc, line) => {
                line = line.trim();
                if (!line) return acc;

                if (line.startsWith('~~')) {
                    acc.push(line);
                } else if (acc.length > 0) {
                    acc[acc.length - 1] += '\n' + line;
                }

                return acc;
            }, [])
            .filter(Boolean);

        renderPage(currentPage);
        renderPagination();

    } catch (error) {
        console.error(error);
        document.getElementById('quiz').innerHTML =
            '<p style="color:red;">test.txt жүктелмеді</p>';
    }
}

function renderPage(page) {
    const start = (page - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const pageQuestions = allQuestions.slice(start, end);
    renderCustomQuestions(pageQuestions, start);
}

function renderCustomQuestions(questionsArray, globalStartIndex = 0) {
    const quiz = document.getElementById('quiz');
    quiz.innerHTML = '';

    questionsArray.forEach((block, index) => {

        const lines = block.split('\n').map(l => l.trim()).filter(Boolean);

        let question = '';
        let variants = [];
        let correctIndex = 0;

        lines.forEach(line => {
            if (line.startsWith('~~')) {
                question = line.replace('~~', '').trim();
            }

            else if (line.startsWith('@@')) {
                variants.push(line.replace('@@', '').trim());
            }

            else if (line.includes('{@A@}')) {
                correctIndex = 0; // всегда первый вариант
            }
        });

        const qIndex = globalStartIndex + index;
        const correctValue = variants[correctIndex];

        const shuffled = shuffle([...variants]);

        const div = document.createElement('div');
        div.className = 'question';

        const p = document.createElement('p');
        p.style.whiteSpace = 'pre-line';
        p.textContent = (qIndex + 1) + '. ' + question;
        div.appendChild(p);

        const result = document.createElement('div');
        result.id = 'result' + qIndex;

        shuffled.forEach(v => {

            const label = document.createElement('label');
            label.className = 'variant';

            const input = document.createElement('input');
            input.type = 'radio';
            input.name = 'q' + qIndex;
            input.value = v;

            input.addEventListener('change', () => {
                checkAnswer(qIndex, v, correctValue);
                disableAll(qIndex);
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + v));
            div.appendChild(label);
        });

        div.appendChild(result);
        quiz.appendChild(div);
    });
}

function checkAnswer(qIndex, selected, correctValue) {
    const result = document.getElementById('result' + qIndex);

    if (selected === correctValue) {
        result.textContent = 'Дұрыс ✅';
        result.className = 'correct';
    } else {
        result.innerHTML = `Қате ❌`;
        result.className = 'incorrect';
    }
}

function disableAll(qIndex) {
    document.querySelectorAll(`input[name="q${qIndex}"]`)
        .forEach(el => el.disabled = true);
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function renderPagination() {
    const div = document.getElementById('pagination');
    div.innerHTML = '';

    const pages = Math.ceil(allQuestions.length / questionsPerPage);

    for (let i = 1; i <= pages; i++) {
        const btn = document.createElement('button');

        btn.textContent = i;
        if (i === currentPage) btn.classList.add('active');

        btn.onclick = () => {
            currentPage = i;
            renderPage(i);
            renderPagination();
        };

        div.appendChild(btn);
    }
}

function shuffleQuestions() {
    allQuestions = shuffle([...allQuestions]);
    currentPage = 1;
    renderPage(currentPage);
    renderPagination();
}

function shuffleCurrentPage() {
    const start = (currentPage - 1) * questionsPerPage;
    const end = start + questionsPerPage;

    const part = allQuestions.slice(start, end);
    const shuffled = shuffle([...part]);

    for (let i = 0; i < shuffled.length; i++) {
        allQuestions[start + i] = shuffled[i];
    }

    renderPage(currentPage);
}

function resetAll() {
    currentPage = 1;
    loadTest();
}

function showAllAnswers() {
    const questions = document.querySelectorAll('.question');
    const startIndex = (currentPage - 1) * questionsPerPage;

    questions.forEach((q, index) => {

        const globalIndex = startIndex + index;
        const block = allQuestions[globalIndex];
        if (!block) return;

        const lines = block.split('\n');

        let variants = [];
        let correctValue = '';

        lines.forEach(line => {
            if (line.startsWith('@@')) {
                variants.push(line.replace('@@', '').trim());
            }
        });

        correctValue = variants[0]; // первый всегда правильный

        const inputs = q.querySelectorAll('input');

        inputs.forEach(inp => {
            inp.disabled = true;

            if (inp.value === correctValue) {
                inp.parentElement.style.color = 'green';
                inp.parentElement.style.fontWeight = 'bold';
            }
        });

        const resultDiv = document.getElementById('result' + globalIndex);
        if (resultDiv) {
            resultDiv.innerHTML = `✔ Дұрыс жауап: <b>${correctValue}</b>`;
            resultDiv.className = 'correct';
        }
    });
}

loadTest();

</script>

</body>
</html>
